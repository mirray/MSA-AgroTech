name: Generate PlantUML Diagrams

on:
  push:
    branches:
      - main
      - Task1
      - Task2
      - Task3
      - Task4
      - Task5
  pull_request:
    branches:
      - Task1
      - Task2
      - Task3
      - Task4
      - Task5

jobs:
  plantuml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          # Required if the action needs to commit back to the repo
          fetch-depth: 0 

      - name: Generate SVG Diagrams
        # This uses a specific, well-maintained action from the marketplace
        uses: holowinski/plantuml-github-action@main
        with:
          # Arguments passed to the PlantUML command line tool
          args: -tsvg "**/*.puml" 
          
      - name: Commit Generated Files
        # Use an action to automatically commit the new or updated images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Generate SVG files for PlantUML diagrams"
          branch: ${{ github.head_ref }} # Commit to the current branch